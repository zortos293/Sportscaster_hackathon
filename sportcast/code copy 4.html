<script>
        // Simple micro-interaction for the play/pause toggle
        const playBtn = document.querySelector('button .material-symbols-outlined[style*="pause"]');
        if(playBtn) {
            playBtn.parentElement.addEventListener('click', function() {
                const icon = this.querySelector('.material-symbols-outlined');
                if(icon.innerText === 'pause') {
                    icon.innerText = 'play_arrow';
                } else {
                    icon.innerText = 'pause';
                }
            });
        }

        // Progress bar simulation click
        const progressBar = document.querySelector('.progress-bar');
        const progressFill = document.querySelector('.progress-bar-fill');
        if(progressBar) {
            progressBar.addEventListener('click', (e) => {
                const rect = progressBar.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const percentage = Math.min(Math.max(0, x / rect.width), 1) * 100;
                progressFill.style.width = percentage + '%';
            });
        }
    </script>
