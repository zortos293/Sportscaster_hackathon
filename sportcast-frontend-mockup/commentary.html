<style>
        .material-symbols-outlined {

        .hide-scrollbar::-webkit-scrollbar { display: none; }

        .live-action-btn:hover {
            background: #f4f4f5;
        }

        .live-action-btn:active {
            transform: scale(0.98);
        }

        .live-action-btn .icon-wrap {

            height: 2.75rem;
            border-radius: 9999px;
            background: #f4f4f5;
            color: #3f3f46;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #live-player-section.is-live #play-overlay {
            opacity: 0;
            pointer-events: none;
        }

        #live-player-section.is-live #hero-info {
            opacity: 0.85;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e2e4;
            border-radius: 10px;
        }

        #insights-backdrop {
            display: none;
        }

        #live-player-section {
            --insights-panel-width: 380px;
        }

        .live-stage {
            background: #ffffff;
            border: 1px solid #e8e8ea;
            overflow: hidden;
        }

        #insights-panel {
            width: 0;
            max-width: 0;
            height: 0;
            max-height: 0;
            overflow: hidden;
            flex-shrink: 0;
            opacity: 0;
            border-left: 0;
            display: flex;
            flex-direction: column;
            min-height: 0;
            pointer-events: none;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1), max-width 0.35s cubic-bezier(0.4, 0, 0.2, 1), max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
        }

        #insights-panel-scroll {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
        }

        #live-player-section.insights-open #insights-panel {
            width: 100%;
            max-width: 100%;
            height: auto;
            opacity: 1;
            max-height: 24rem;
            border-top: 1px solid #e8e8ea;
            pointer-events: auto;
        }

        @media (min-width: 1024px) {
            #live-player-section.insights-open .live-stage {
                position: relative;
                width: 100%;
            }

            #live-player-section.insights-open .live-player-main {
                flex: 0 0 calc(100% - var(--insights-panel-width));
                width: calc(100% - var(--insights-panel-width));
                max-width: calc(100% - var(--insights-panel-width));
            }

            #live-player-section.insights-open #insights-panel {
                position: absolute;
                top: 0;
                right: 0;
                bottom: 0;
                width: var(--insights-panel-width);
                max-width: var(--insights-panel-width);
                flex: none;
                height: auto;
                max-height: none;
                align-self: auto;
                border-top: none;
                border-left: 1px solid #e8e8ea;
                pointer-events: auto;
            }

            #live-player-section.insights-open #live-screen {
                border-top-right-radius: 0;
            }

            #live-player-section.insights-open .live-action-bar {
                border-bottom-right-radius: 0;
            }

            #live-player-section.insights-open #insights-panel {
                border-top-right-radius: 0.75rem;
                border-bottom-right-radius: 0.75rem;
            }
        }

        .live-action-btn.is-active {
            background: #fef2f2;
            border-color: #b52420;
            box-shadow: 0 0 0 1px rgba(181, 36, 32, 0.12);
        }

    
        .commentary-progress {
            background: rgba(255, 255, 255, 0.2);
            height: 4px;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }
        .commentary-progress-fill {
            background: #ff5a4e;
            height: 100%;
            width: 35%;
            border-radius: 2px;
            position: relative;
        }
        .commentary-progress-thumb {
            width: 12px;
            height: 12px;
            background: #ffffff;
            border-radius: 50%;
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .commentary-blur-overlay {
            backdrop-filter: blur(60px) brightness(0.4);
        }

<script>
document.addEventListener('DOMContentLoaded', () => {
    const playBtn = document.getElementById('commentary-play-btn');
    const playIcon = document.getElementById('commentary-play-icon');
    if (playBtn && playIcon) {
        playBtn.addEventListener('click', () => {
            playIcon.textContent = playIcon.textContent === 'pause' ? 'play_arrow' : 'pause';
        });
    }
    const progressBar = document.getElementById('commentary-progress');
    const progressFill = document.getElementById('commentary-progress-fill');
    if (progressBar && progressFill) {
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percentage = Math.min(Math.max(0, x / rect.width), 1) * 100;
            progressFill.style.width = percentage + '%';
        });
    }
});
</script>
